<body>
    <div id="auth-form">
        <h3>Login or Sign Up</h3>
        <input type="email" id="email" placeholder="Email"><br><br>
        <input type="password" id="password" placeholder="Password"><br><br>
        <button id="btn-login">Log In</button>
        <button id="btn-signup">Sign Up</button>
    </div>

    <div id="chat-box" class="hidden" style="display: flex; gap: 20px; width: 600px;">
        
        <div id="sidebar" style="width: 200px; border-right: 1px solid #ccc; padding-right: 15px;">
            <h3>Direct Messages</h3>
            <div id="users-list"></div>
            <br><hr><br>
            <button id="btn-logout">Log Out</button>
        </div>

        <div id="workspace" style="flex-grow: 1;">
            <h3 id="chat-header">Select a user to start a private DM</h3>
            <div id="messages" style="height: 250px; overflow-y: auto; border: 1px solid #ddd; padding: 5px; margin-bottom: 10px;"></div>
            <input type="text" id="message-input" placeholder="Type a private message..." disabled>
            <button id="btn-send" disabled>Send</button>
        </div>

    </div>

    <script type="module" src="app.js"></script>
</body>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Firebase Chat</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; display: flex; gap: 20px; }
        .hidden { display: none !important; }
        #auth-form { border: 1px solid #ccc; padding: 20px; border-radius: 8px; width: 300px; }
#chat-box { border: 1px solid #ccc; padding: 20px; border-radius: 8px; width: 600px; display: flex; }
    </style>
</head>
<body>
    <div id="auth-form">
        <h3>💬Chat</h3>
        <input type="text" id="display-name" placeholder="Your Display Name (For Sign Up only)">
        <input type="email" id="email" placeholder="Email Address">
        <input type="password" id="password" placeholder="Password">
        <button id="btn-signup">Create Account</button>
        <button id="btn-login">Sign In</button>
    </div>

    <div id="chat-box" class="hidden" style="gap: 20px; width: 600px;">
        
        <div id="sidebar" style="width: 200px; border-right: 1px solid #ccc; padding-right: 15px;">
            <h3>Direct Messages</h3>
            <div id="users-list"></div>
            <br><hr><br>
            <button id="btn-logout">Log Out</button>
        </div>

        <div id="workspace" style="flex-grow: 1;">
            <h3 id="chat-header">Select a user to start a private DM</h3>
            <div id="messages" style="height: 250px; overflow-y: auto; border: 1px solid #ddd; padding: 5px; margin-bottom: 10px;"></div>
            <input type="text" id="message-input" placeholder="Type a private message..." disabled>
            <button id="btn-send" disabled>Send</button>
        </div>

    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
